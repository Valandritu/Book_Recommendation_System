<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #111119;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        .container-box {
            background: #1c1c27;
            padding: 30px;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 60%;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            font-weight: bold;
            color: #ffda79;
        }
        input {
            background: #2a2a38 !important;
            color: white !important;
            border: 1px solid #444;
        }
        .btn-submit {
            width: 100%;
            background-color: #28a745;
            border: none;
            padding: 10px;
            font-size: 18px;
            border-radius: 0.5rem;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #1e7e34;
        }
        .btn-back {
            color: white;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn-back:hover {
            color: #0dcaf0;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center mt-5">
    <div class="container-box">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button onclick="window.history.back()" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Back</button>
        </div>

        <h2>Edit User</h2>

        <form action="{{ url_for('edit_user', user_id=user[0]) }}" method="POST">
            {# CSRF token if using Flask-WTF #}

            <div class="mb-3">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-control" 
                    value="{{ user[1] }}" 
                    required>
            </div>

            <div class="mb-3">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-control" 
                    value="{{ user[2] }}" 
                    required>
            </div>

            <button type="submit" class="btn-submit">Save Changes</button>
        </form>

    </div>
</div>

</body>
</html>
