<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="header">
    <h1><i class="fas fa-book-open"></i> Book Recommendation System</h1>
  </div>

    <div class="form-box">
        <h2>Register</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required autocomplete="off"><br>
            <input type="email" name="email" placeholder="Email" required autocomplete="off"><br>
            <input type="password" name="password" placeholder="Password" required autocomplete="off"><br><br>
            <button type="submit"><i class="fas fa-user-plus"></i> Register</button>
        </form>
        <p>Already have an account? <a href="{{ url_for('login') }}" class="link">Login</a></p>
    </div>
</body>
</html>
