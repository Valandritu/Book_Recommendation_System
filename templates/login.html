<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache"> 
    <meta http-equiv="Expires" content="0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #111119 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .login-card {
            background: #1a1a1a;
            border: 2px solid #6f42c1;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #6f42c1;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #999;
            font-size: 14px;
        }
        
        .admin-icon {
            font-size: 48px;
            color: #6f42c1;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            background: #333;
            border-color: #6f42c1;
            color: #fff;
            outline: none;
            box-shadow: 0 0 8px rgba(111, 66, 193, 0.3);
        }
        
        .form-group input::placeholder {
            color: #666;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6f42c1 0%, #5a32a3 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(111, 66, 193, 0.4);
        }
   
        .login-btn:active {
            transform: translateY(0);
        }
        
        .alert {
            margin-bottom: 20px;
            border-radius: 6px;
            border: none;
            padding: 12px 15px;
            font-size: 14px;
        }
        
        .alert-danger {
            background: #2a1a1a;
            color: #ff6b6b;
            border-left: 4px solid #ff6b6b;
        }
        
        .alert-success {
            background: #1a2a1a;
            color: #51cf66;
            border-left: 4px solid #51cf66;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #6f42c1;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .back-link a:hover {
            color: #5a32a3;
            text-decoration: underline;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6f42c1;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s ease;
            padding: 0;
        }
        
        .toggle-password:hover {
            color: #5a32a3;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="admin-icon">
                    <i class="fas fa-user"></i>
                </div>
                <h1>User Login</h1>
                <p>Book Recommendation System</p>
            </div>
            
           {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% set last_message = messages[-1] %}
                <div class="alert alert-{{ 'danger' if last_message[0] == 'danger' else 'success' }}">
                  {{ last_message[1] }}
                </div>
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" required placeholder="Enter your email" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" required placeholder="Enter your password" autocomplete="off">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button class="login-btn" type="submit">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="back-link">
                <a href="{{ url_for('forgot_password') }}">
                    <i class="fas fa-key"></i> Forgot Password?
                </a>
            </div>
            
            <div class="back-link">
                <a href="{{ url_for('register') }}">
                    <i class="fas fa-user-plus"></i> Don't have an account? Register
                </a>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                passwordInput.type = 'password';
                toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }
    </script>
    <script>
    window.onload = function() {
        // For login.html (email and password)
        const emailField = document.querySelector('input[name="email"]');
        const passwordField = document.querySelector('input[name="password"]');
        if (emailField) emailField.value = '';
        if (passwordField) passwordField.value = '';

        // For admin_login.html, change 'email' to 'username' if needed:
        // const usernameField = document.querySelector('input[name="username"]');
        // if (usernameField) usernameField.value = '';
    };
</script>
</body>
</html>
