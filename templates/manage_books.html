<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Books</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #111119;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        h2 {
            font-weight: 600;
        }
        .card {
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        table {
            background-color: #1b1b27;
            color: white;
        }
        th {
            color: #ffda79;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <button onclick="window.history.back()" class="btn btn-outline-light me-3"><i class="fas fa-arrow-left"></i> Back</button>
        <a class="navbar-brand fw-bold" href="{{ url_for('admin_dashboard') }}">Admin Panel</a>
        <div class="ms-auto">

            <a class="btn btn-outline-light" href="{{ url_for('admin_logout') }}">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Manage Books</h2>
    <a href="{{ url_for('add_book') }}" class="btn btn-success mb-3">Add New Book</a>

    <div class="table-responsive">
        <table class="table table-striped table-dark align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Category</th>
                    <th>Year</th>
                    <th>PDF</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td>{{ book[0] }}</td>
                    <td>{{ book[1] }}</td>
                    <td>{{ book[2] }}</td>
                    <td>{{ book[3] }}</td>
                    <td>{{ book[4] }}</td>
                    <td>
                        {% if book[5] %}
                        <a href="{{ url_for('static', filename='uploads/books/' ~ book[5]) }}" class="btn btn-sm btn-info" target="_blank"><i class="fas fa-eye"></i> View</a>
                        {% else %}
                        N/A
                        {% endif %}
                    </td>
                    <td>
                        <a href="{{ url_for('edit_book', book_id=book[0]) }}" class="btn btn-sm btn-warning">Edit</a>
                        <a href="{{ url_for('delete_book', book_id=book[0]) }}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this book?');">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
