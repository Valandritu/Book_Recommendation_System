<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #111119;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        .container-box {
            background: #1c1c27;
            padding: 30px;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 60%;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            font-weight: bold;
            color: #ffda79;
        }
        input, select {
            background: #2a2a38 !important;
            color: white !important;
            border: 1px solid #444;
        }
        .btn-submit {
            width: 100%;
            background-color: #007bff;
            border: none;
            padding: 10px;
            font-size: 18px;
            border-radius: 0.5rem;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #0056b3;
        }
        .btn-back {
            color: white;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn-back:hover {
            color: #0dcaf0;
        }
        hr {
            border-color: #444;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center mt-5">
    <div class="container-box">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button onclick="window.history.back()" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Back</button>
        </div>
        <h2>Add User</h2>

        <form action="{{ url_for('add_user') }}" method="POST">
            {# If using CSRF, include token here: {{ csrf_token() }} or {{ form.hidden_tag() }} #}

            <div class="mb-3">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <!-- optional role field (uncomment if you need it)
            <div class="mb-3">
                <label for="role">Role</label>
                <select id="role" name="role" class="form-control">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            -->

            <button class="btn-submit" type="submit">Add User</button>
        </form>

    </div>
</div>
</body>
</html>
