<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #111119;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        h2 {
            font-weight: 600;
        }

        /* Logout button */
        .btn-logout {
            color: white;
            border-color: white;
            transition: 0.2s;
        }
        .btn-logout:hover {
            background-color: #c0392b;
            color: white;
        }

        /* Dashboard buttons */
        .btn-dashboard {
            border-radius: 0.8rem;
            transition: 0.2s;
        }
        .btn-dashboard:hover {
            transform: scale(1.05);
        }

        /* Dashboard Cards */
        .admin-card {
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
            text-align: center;
        }
        .admin-card:hover {
            transform: translateY(-5px);
        }

        /* Chart card styling */
        canvas {
            background: #fff;
            border-radius: 1rem;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <button onclick="window.history.back()" class="btn btn-outline-light me-3"><i class="fas fa-arrow-left"></i> Back</button>
        <a class="navbar-brand fw-bold" href="{{ url_for('admin_dashboard') }}">Admin Panel</a>
        <div class="ms-auto">
            <a class="btn btn-outline-light btn-logout" href="{{ url_for('admin_logout') }}">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Welcome, {{ session['admin_username'] }}!</h2>

    <!-- DASHBOARD BUTTONS -->
    <div class="row g-3">
        <div class="col-md-3 col-6">
            <a href="{{ url_for('manage_books') }}" class="btn btn-primary w-100 btn-dashboard">Manage Books</a>
        </div>

        <div class="col-md-3 col-6">
            <a href="{{ url_for('manage_users') }}" class="btn btn-success w-100 btn-dashboard">Manage Users</a>
        </div>

        <div class="col-md-3 col-6">
            <a href="{{ url_for('manage_reviews') }}" class="btn btn-warning w-100 btn-dashboard">Manage Reviews</a>
        </div>

        <div class="col-md-3 col-6">
            <a href="{{ url_for('admin_analytics') }}" class="btn btn-info w-100 btn-dashboard">View Analytics</a>
        </div>
    </div>

    <!-- STAT CARDS -->
    <div class="row mt-5 g-4">
        <div class="col-md-4 col-sm-6">
            <div class="card admin-card text-white bg-primary p-4">
                <div class="card-body">
                    <h5>Total Users</h5>
                    <p class="fs-3">{{ total_users }}</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="card admin-card text-white bg-success p-4">
                <div class="card-body">
                    <h5>Total Books</h5>
                    <p class="fs-3">{{ total_books }}</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="card admin-card text-white bg-warning p-4">
                <div class="card-body">
                    <h5>Total Reviews</h5>
                    <p class="fs-3">{{ total_reviews }}</p>
                </div>
            </div>
        </div>
    </div>

    <!-- CHART -->
    <div class="row mt-5">
        <div class="col-12">
            <canvas id="dashboardChart" height="100"></canvas>
        </div>
    </div>
</div>

<!-- CHART SCRIPT -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const ctx = document.getElementById('dashboardChart').getContext('2d');
        
        // eslint-disable-next-line no-undef
        const totalUsers = parseInt('{{ total_users }}');
        const totalBooks = parseInt('{{ total_books }}');
        const totalReviews = parseInt('{{ total_reviews }}');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Users', 'Books', 'Reviews'],
                datasets: [{
                    label: 'Totals',
                    data: [totalUsers, totalBooks, totalReviews],
                    backgroundColor: [
                        'rgba(0, 123, 255, 0.8)',
                        'rgba(40, 167, 69, 0.8)',
                        'rgba(255, 193, 7, 0.8)'
                    ],
                    borderColor: [
                        'rgba(0, 123, 255, 1)',
                        'rgba(40, 167, 69, 1)',
                        'rgba(255, 193, 7, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { precision: 0 } }
                }
            }
        });
    });
</script>

</body>
</html>
