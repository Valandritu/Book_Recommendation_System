<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-book-open"></i> Book Recommendation System</h1>
  </div>

  <div class="form-box">
    <h2>Forgot Password</h2>
    <form method="POST" action="{{ url_for('forgot_password') }}">
      <input type="email" name="email" placeholder="Email" required autocomplete="off"><br>
      <input type="password" name="new_password" placeholder="New Password" required autocomplete="off"><br><br>
      <button type="submit"><i class="fas fa-key"></i> Reset Password</button>
    </form>
    <p><a href="{{ url_for('login') }}" class="link">Back to Login</a></p>
  </div>
</body>
</html>
