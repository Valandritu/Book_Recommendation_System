<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #111119;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        .container-box {
            background: #1c1c27;
            padding: 30px;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 60%;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            font-weight: bold;
        }
        input, select {
            background: #2a2a38 !important;
            color: white !important;
            border: 1px solid #444;
        }
        .btn-submit {
            width: 100%;
            background-color: #28a745;
            border: none;
            padding: 10px;
            font-size: 18px;
            border-radius: 0.5rem;
        }
        .btn-submit:hover {
            background-color: #1e7e34;
        }
        .btn-back {
            color: white;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn-back:hover {
            color: #0dcaf0;
        }

        /* Back button style */
        .btn-back-corner {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-back-corner:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #0dcaf0;
        }
        .btn-back-corner i {
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center mt-5">
    <div class="container-box">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button onclick="window.history.back()" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Back</button>
        </div>
        <h2>Edit Book</h2>
        <form action="{{ url_for('edit_book', book_id=book[0]) }}" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label>Book Title</label>
                <input type="text" name="title" value="{{ book[1] }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Author</label>
                <input type="text" name="author" value="{{ book[2] }}" class="form-control">
            </div>
            <div class="mb-3">
                <label>Category</label>
                <input type="text" name="category" value="{{ book[3] }}" class="form-control">
            </div>
            <div class="mb-3">
                <label>Year</label>
                <input type="text" name="year" value="{{ book[4] }}" class="form-control">
            </div>
            <div class="mb-3">
                <label>PDF File (Optional)</label>
                <input type="file" name="pdf_file" class="form-control" accept=".pdf">
                {% if book[5] %}
                    <small>Current file: 
                        <a href="{{ url_for('static', filename='uploads/books/' ~ book[5]) }}" target="_blank" style="color:#0dcaf0;">
                            View PDF
                        </a>
                    </small>
                {% endif %}
            </div>
            <button class="btn-submit">Update Book</button>
        </form>
    </div>
</div>
</body>
</html>
