<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #111119;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        .container-box {
            background: #1c1c27;
            padding: 30px;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 60%;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            font-weight: bold;
        }
        input, select {
            background: #2a2a38 !important;
            color: white !important;
            border: 1px solid #444;
        }
        .btn-submit {
            width: 100%;
            background-color: #007bff;
            border: none;
            padding: 10px;
            font-size: 18px;
            border-radius: 0.5rem;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #0056b3;
        }
        .btn-back {
            color: white;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn-back:hover {
            color: #0dcaf0;
        }
        hr {
            border-color: #444;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center mt-5">
    <div class="container-box">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button onclick="window.history.back()" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Back</button>
        </div>
        <h2>Add Book</h2>

        <form action="{{ url_for('add_book') }}" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label>Book Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter book title" required>
            </div>
            <div class="mb-3">
                <label>Author</label>
                <input type="text" name="author" class="form-control" placeholder="Enter author">
            </div>
            <div class="mb-3">
                <label>Category</label>
                <input type="text" name="category" class="form-control" placeholder="Enter category">
            </div>
            <div class="mb-3">
                <label>Year</label>
                <input type="text" name="year" class="form-control" placeholder="Enter year">
            </div>
            <div class="mb-3">
                <label>Upload PDF</label>
                <input type="file" name="pdf_file" class="form-control" accept=".pdf">
            </div>
           
            <button class="btn-submit">Add Book</button>
        </form>

    </div>
</div>
</body>
</html>
