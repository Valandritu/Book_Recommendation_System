<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #111119;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        h2 {
            font-weight: 600;
        }
        table {
            background-color: #1b1b27;
            color: white;
        }
        th {
            color: #ffda79;
        }
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <button onclick="window.history.back()" class="btn btn-outline-light me-3"><i class="fas fa-arrow-left"></i> Back</button>
        <a class="navbar-brand fw-bold" href="{{ url_for('admin_dashboard') }}">Admin Panel</a>
        <div class="ms-auto">

            <a class="btn btn-outline-light" href="{{ url_for('admin_logout') }}">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Manage Users</h2>

    <!-- Add User Button -->
    <div class="mb-3">
        <a href="{{ url_for('add_user') }}" class="btn btn-success btn-sm">+ Add User</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-dark align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th style="width: 160px;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user[0] }}</td> <!-- User ID -->
                    <td>{{ user[1] }}</td> <!-- Username -->
                    <td>{{ user[2] }}</td> <!-- Email -->

                    <td class="d-flex gap-2">

                        <!-- Edit Button -->
                        <a href="{{ url_for('edit_user', user_id=user[0]) }}"
                           class="btn btn-sm btn-warning">Edit</a>

                        <!-- Delete Button (POST Form) -->
                        <form method="post"
                              action="{{ url_for('delete_user', user_id=user[0]) }}"
                              style="display:inline;">
                            <button type="submit"
                                    class="btn btn-sm btn-danger"
                                    onclick="return confirm('Are you sure you want to delete this user?');">
                                Delete
                            </button>
                        </form>

                    </td>
                </tr>

                {% else %}
                <tr>
                    <td colspan="4" class="text-center">No users found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
